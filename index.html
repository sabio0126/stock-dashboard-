<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="株価情報" />
  <title>株価影響情報ダッシュボード</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #888780;
      --text-accent: #185fa5;
      --text-success: #3b6d11;
      --text-danger: #a32d2d;
      --text-warning: #854f0b;
      --surface-0: #f1efe8;
      --surface-1: #f7f6f1;
      --surface-2: #ffffff;
      --border: rgba(0,0,0,0.12);
      --border-accent: #85b7eb;
      --bg-accent: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-danger: #fcebeb;
      --bg-warning: #faeeda;
      --fill-accent: #378add;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #e8e6df;
        --text-secondary: #b4b2a9;
        --text-muted: #888780;
        --text-accent: #85b7eb;
        --text-success: #97c459;
        --text-danger: #f09595;
        --text-warning: #ef9f27;
        --surface-0: #1c1c1a;
        --surface-1: #252522;
        --surface-2: #2e2e2b;
        --border: rgba(255,255,255,0.1);
        --border-accent: #185fa5;
        --bg-accent: #042c53;
        --bg-success: #173404;
        --bg-danger: #501313;
        --bg-warning: #412402;
        --fill-accent: #378add;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1rem;
      max-width: 680px;
      margin: 0 auto;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .header h1 { font-size: 18px; font-weight: 500; flex: 1; }
    .refresh-btn { background: none; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 10px; cursor: pointer; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 4px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input { flex: 1; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface-2); color: var(--text-primary); font-size: 14px; outline: none; }
    .search-row input:focus { border-color: var(--fill-accent); }
    button { padding: 8px 16px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface-2); color: var(--text-primary); font-size: 14px; cursor: pointer; }
    button:hover { background: var(--surface-1); }
    .ticker-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .ticker-tag { font-size: 12px; padding: 4px 10px; border-radius: var(--radius); background: var(--bg-accent); color: var(--text-accent); border: 0.5px solid var(--border-accent); cursor: pointer; }
    .tabs { display: flex; gap: 4px; border-bottom: 0.5px solid var(--border); margin-bottom: 1rem; }
    .tab { padding: 8px 14px; font-size: 14px; color: var(--text-secondary); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--text-accent); border-bottom-color: var(--fill-accent); }
    .section-title { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .news-item { padding: 12px 0; border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
    .news-item:last-child { border-bottom: none; }
    .news-title { font-size: 14px; line-height: 1.4; }
    .news-title a { color: var(--text-primary); text-decoration: none; }
    .news-title a:hover { color: var(--text-accent); }
    .news-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .news-source { font-size: 12px; color: var(--text-muted); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: var(--radius); }
    .badge-up { background: var(--bg-success); color: var(--text-success); }
    .badge-down { background: var(--bg-danger); color: var(--text-danger); }
    .badge-neutral { background: var(--surface-1); color: var(--text-secondary); border: 0.5px solid var(--border); }
    .badge-warning { background: var(--bg-warning); color: var(--text-warning); }
    .indicator-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 1rem; }
    .indicator-card { background: var(--surface-1); border-radius: var(--radius); padding: 12px; }
    .indicator-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .indicator-value { font-size: 18px; font-weight: 500; }
    .indicator-change { font-size: 12px; margin-top: 2px; }
    .up { color: var(--text-success); }
    .down { color: var(--text-danger); }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }
    .error { text-align: center; padding: 1rem; color: var(--text-danger); font-size: 13px; background: var(--bg-danger); border-radius: var(--radius); margin-bottom: 1rem; }
    .last-updated { font-size: 11px; color: var(--text-muted); text-align: right; margin-bottom: 0.5rem; }
  </style>
</head>
<body>

<div class="header">
  <i class="ti ti-chart-line" style="font-size:22px;color:var(--text-accent)"></i>
  <h1>株価影響情報ダッシュボード</h1>
  <button class="refresh-btn" onclick="refreshAll()"><i class="ti ti-refresh"></i> 更新</button>
</div>

<div class="search-row">
  <input type="text" id="tickerInput" placeholder="銘柄を追加（例：AAPL、7203）" onkeydown="if(event.key==='Enter')addTicker()" />
  <button onclick="addTicker()">追加</button>
</div>

<div class="ticker-tags" id="tickerTags"></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('news', this)">ニュース</button>
  <button class="tab" onclick="switchTab('indicators', this)">経済指標</button>
</div>

<div id="tab-news">
  <div class="last-updated" id="newsUpdated"></div>
  <div class="section-title">最新ニュース（株式・経済）</div>
  <div id="newsList"><div class="loading">読み込み中...</div></div>
</div>

<div id="tab-indicators" style="display:none">
  <div class="section-title">主要経済指標</div>
  <div class="indicator-grid" id="indicatorGrid"></div>
  <div class="section-title" style="margin-top:1rem">今週の注目イベント</div>
  <div id="eventList"></div>
</div>

<script>
const NEWS_API_KEY = '04439f7644ff4882a2c4b1a8785c0b82';
const STORAGE_KEY = 'stock_dashboard_tickers';

const defaultTickers = ['NVDA', 'AAPL', '7203', '6758', 'SPY'];

function loadTickers() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : [...defaultTickers];
  } catch(e) { return [...defaultTickers]; }
}

function saveTickers(tickers) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tickers)); } catch(e) {}
}

let activeTickers = loadTickers();

function renderTickers() {
  document.getElementById('tickerTags').innerHTML = activeTickers.map(t =>
    `<span class="ticker-tag" onclick="removeTicker('${t}')">${t} ×</span>`
  ).join('');
}

function addTicker() {
  const val = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (val && !activeTickers.includes(val)) {
    activeTickers.push(val);
    saveTickers(activeTickers);
    renderTickers();
    fetchNews();
  }
  document.getElementById('tickerInput').value = '';
}

function removeTicker(t) {
  if (activeTickers.length === 1) return;
  activeTickers = activeTickers.filter(x => x !== t);
  saveTickers(activeTickers);
  renderTickers();
  fetchNews();
}

async function fetchNews() {
  const el = document.getElementById('newsList');
  el.innerHTML = '<div class="loading">ニュースを取得中...</div>';

  const query = activeTickers.join(' OR ') + ' OR 株式 OR 株価 OR 日経 OR S&P500 OR 経済指標';

  try {
    const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&language=jp&sortBy=publishedAt&pageSize=20&apiKey=${NEWS_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.status !== 'ok') throw new Error(data.message || 'API error');

    const articles = data.articles.filter(a => a.title && a.title !== '[Removed]');

    if (articles.length === 0) {
      // 英語でも試す
      const url2 = `https://newsapi.org/v2/everything?q=${encodeURIComponent(activeTickers.join(' OR ') + ' stock market')}&language=en&sortBy=publishedAt&pageSize=20&apiKey=${NEWS_API_KEY}`;
      const res2 = await fetch(url2);
      const data2 = await res2.json();
      renderNews(data2.articles || []);
    } else {
      renderNews(articles);
    }

    const now = new Date();
    document.getElementById('newsUpdated').textContent = `最終更新：${now.toLocaleTimeString('ja-JP')}`;

  } catch(e) {
    el.innerHTML = `<div class="error">ニュースの取得に失敗しました。しばらくしてから「更新」を押してください。<br><small>${e.message}</small></div>`;
  }
}

function renderNews(articles) {
  const el = document.getElementById('newsList');
  if (!articles || articles.length === 0) {
    el.innerHTML = '<div class="loading">ニュースが見つかりませんでした</div>';
    return;
  }

  el.innerHTML = articles.slice(0, 15).map(a => {
    const date = new Date(a.publishedAt);
    const timeStr = date.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const title = a.title.replace(' - ' + a.source.name, '');
    return `
      <div class="news-item">
        <div class="news-title"><a href="${a.url}" target="_blank">${title}</a></div>
        <div class="news-meta">
          <span class="news-source">${a.source.name} · ${timeStr}</span>
        </div>
      </div>`;
  }).join('');
}

const mockIndicators = [
  { label: '米CPI（前年比）', value: '3.2%', change: '+0.1%', up: false },
  { label: '米10年債利回り', value: '4.28%', change: '-0.03%', up: false },
  { label: 'ドル/円', value: '157.42', change: '+0.38', up: true },
  { label: 'VIX（恐怖指数）', value: '18.4', change: '-1.2', up: false },
  { label: 'S&P500', value: '5,480', change: '+0.6%', up: true },
  { label: '日経平均', value: '38,640', change: '-0.4%', up: false },
];

const mockEvents = [
  { date: '7/1（火）', event: '米ISM製造業景況指数', importance: 'high' },
  { date: '7/2（水）', event: 'ADP雇用統計（米）', importance: 'high' },
  { date: '7/3（木）', event: '米新規失業保険申請件数', importance: 'medium' },
  { date: '7/4（金）', event: '米雇用統計（非農業部門雇用者数）', importance: 'high' },
];

function renderIndicators() {
  document.getElementById('indicatorGrid').innerHTML = mockIndicators.map(i => `
    <div class="indicator-card">
      <div class="indicator-label">${i.label}</div>
      <div class="indicator-value">${i.value}</div>
      <div class="indicator-change ${i.up ? 'up' : 'down'}">${i.up ? '▲' : '▼'} ${i.change}</div>
    </div>`).join('');

  const importanceMap = { high: 'badge-down', medium: 'badge-warning' };
  const importanceLabel = { high: '重要', medium: '注目' };
  document.getElementById('eventList').innerHTML = mockEvents.map(e => `
    <div class="news-item">
      <div class="news-meta">
        <span class="news-source">${e.date}</span>
        <span class="badge ${importanceMap[e.importance]}">${importanceLabel[e.importance]}</span>
      </div>
      <div class="news-title">${e.event}</div>
    </div>`).join('');
}

function switchTab(name, btn) {
  ['news', 'indicators'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function refreshAll() {
  fetchNews();
}

renderTickers();
renderIndicators();
fetchNews();
</script>
</body>
</html>
